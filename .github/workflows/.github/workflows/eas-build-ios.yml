name: EAS Build — iOS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'preview or production'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: |
          eas build \
          --platform ios \
          --profile ${{ github.event.inputs.profile }} \
          --non-interactive

      - if: github.event.inputs.profile == 'production'
        run: |
          eas submit \
          --platform ios \
          --latest \
          --non-interactive
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
